<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客戶管家 - 日系簡約版</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1b1e">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #5c7cfa; --bg: #f8f9fa; --card: #ffffff; --text: #2d3436; }
        [data-theme="dark"] { --primary: #748ffc; --bg: #1a1b1e; --card: #2d2e33; --text: #e9ecef; }
        
        body { font-family: "Noto Sans TC", system-ui, sans-serif; background: var(--bg); color: var(--text); margin:0; transition: all 0.3s; }
        .header { background: var(--card); padding: 15px 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.2); display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:100; }
        .container { max-width: 1280px; margin: 0 auto; padding: 20px; }
        
        input, textarea { width: 100%; padding: 12px; border: 1px solid #555; border-radius: 8px; background: var(--card); color: var(--text); }
        button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #40c057; color: white; }
        .btn-danger { background: #ff6b6b; color: white; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #444; }
        th { background: var(--primary); color: white; }
        .debt { color: #ff6b6b; font-weight: bold; }
        .paid { color: #40c057; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color:var(--primary);">📋 客戶管家</h2>
        <div style="display:flex; align-items:center; gap:12px;">
            <span id="modeText" style="font-size:0.9rem; color:#aaa;"></span>
            <button onclick="toggleTheme()" style="font-size:1.4rem; background:none; border:none; padding:6px;">🌓</button>
            
            <div id="userSection" style="display:none; align-items:center; gap:10px;">
                <img id="userAvatar" style="width:32px;height:32px;border-radius:50%;" src="">
                <span id="userName"></span>
            </div>
            <button onclick="googleLogin()" class="btn-primary" id="loginBtn">Google 登入</button>
            <button onclick="signOut()" class="btn-danger" id="logoutBtn" style="display:none;">登出</button>
        </div>
    </div>

    <div class="container">
        <div style="background:var(--card); padding:25px; border-radius:16px; margin-bottom:25px; box-shadow:0 4px 15px rgba(0,0,0,0.2);">
            <h3 id="formTitle">新增客戶</h3>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:15px;">
                <div><label>姓名 *</label><input id="name" required></div>
                <div><label>電話 *</label><input id="phone" required></div>
                <div><label>本次商品細項</label><textarea id="product" rows="2"></textarea></div>
                <div><label>本次收款 (元)</label><input id="payment" type="number" value="0"></div>
                <div><label>欠款金額 (元)</label><input id="debt" type="number" value="0"></div>
                <div><label>地址</label><input id="address"></div>
                <div><label>預計下次送貨時間</label><input id="nextDelivery" type="datetime-local"></div>
                <div><label>備註</label><textarea id="note" rows="2"></textarea></div>
            </div>
            <div style="margin-top:20px; text-align:right;">
                <button onclick="saveCustomer()" class="btn-primary">💾 儲存客戶</button>
                <button onclick="cancelEdit()" style="background:#555;">取消</button>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <input type="text" id="search" placeholder="🔍 搜尋姓名、電話..." onkeyup="filterTable()" style="flex:1; min-width:250px; padding:12px;">
            <div style="display:flex; gap:10px;">
                <button onclick="exportExcel()" class="btn-success">📤 匯出 Excel</button>
                <button onclick="document.getElementById('importFile').click()" class="btn-success">📥 匯入 Excel</button>
                <input type="file" id="importFile" accept=".xlsx,.csv" style="display:none;" onchange="importExcel(event)">
            </div>
        </div>

        <table id="customerTable">
            <thead>
                <tr>
                    <th>姓名</th><th>電話</th><th>商品</th><th>本次收款</th><th>欠款</th>
                    <th>下次送貨</th><th>地址</th><th>操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3>💡 建議登入 Google 帳號</h3>
            <p>目前使用訪客模式，資料僅存在本機。<br>清除快取後可能遺失。</p>
            <div style="margin-top:20px; text-align:right;">
                <button onclick="closeModal()" style="background:#555;">繼續使用訪客模式</button>
                <button onclick="googleLogin()" class="btn-primary">立即 Google 登入</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let customers = [];
        let editingId = null;

        function toggleTheme() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function initGoogle() {
            google.accounts.id.initialize({
                client_id: '95788600787-f8uq7eg5rs5vb7i9r1i7m88npkdb0upd.apps.googleusercontent.com',
                callback: handleCredentialResponse,
            });
        }

        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            currentUser = { email: payload.email, name: payload.name, picture: payload.picture };
            localStorage.setItem('currentGoogleUser', JSON.stringify(currentUser));
            updateUIAfterLogin();
            loadUserData();
            renderTable();
            closeModal();
        }

        function updateUIAfterLogin() {
            document.getElementById('modeText').textContent = '已登入';
            document.getElementById('userSection').style.display = 'flex';
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userAvatar').src = currentUser.picture || '';
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'inline-block';
        }

        function googleLogin() { google.accounts.id.prompt(); }
        function signOut() {
            if (confirm('確定登出？')) location.reload();
        }

        function loadUserData() {
            const key = currentUser ? `customers_${currentUser.email}` : 'guest_customers';
            customers = JSON.parse(localStorage.getItem(key) || '[]');
        }

        function saveUserData() {
            const key = currentUser ? `customers_${currentUser.email}` : 'guest_customers';
            localStorage.setItem(key, JSON.stringify(customers));
        }

        function saveCustomer() {
            const customer = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                product: document.getElementById('product').value.trim(),
                payment: parseInt(document.getElementById('payment').value) || 0,
                debt: parseInt(document.getElementById('debt').value) || 0,
                address: document.getElementById('address').value.trim(),
                nextDelivery: document.getElementById('nextDelivery').value,
                note: document.getElementById('note').value.trim()
            };

            if (!customer.name || !customer.phone) return alert("姓名與電話為必填！");

            if (editingId !== null) customers[editingId] = customer;
            else customers.push(customer);

            saveUserData();
            renderTable();
            cancelEdit();

            if (!currentUser) {
                setTimeout(() => document.getElementById('loginModal').style.display = 'flex', 800);
            }
        }

        function renderTable(filtered = null) {
            const tbody = document.querySelector('#customerTable tbody');
            tbody.innerHTML = '';
            const data = filtered || customers;

            data.forEach((c, i) => {
                const mapsUrl = c.address ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.address)}` : '#';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${c.name}</strong></td>
                    <td>${c.phone}</td>
                    <td>${c.product || '-'}</td>
                    <td class="paid">NT$ ${parseInt(c.payment||0).toLocaleString()}</td>
                    <td class="debt">NT$ ${parseInt(c.debt||0).toLocaleString()}</td>
                    <td>${c.nextDelivery ? new Date(c.nextDelivery).toLocaleString('zh-TW').slice(0,16) : '-'}</td>
                    <td><a href="${mapsUrl}" target="_blank" style="color:var(--primary)">📍 地圖</a></td>
                    <td>
                        <button onclick="editCustomer(${i})">✏️</button>
                        <button onclick="deleteCustomer(${i})" class="btn-danger">🗑️</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        function editCustomer(i) { /* ... */ const c = customers[i]; /* 填入表單 */ editingId = i; document.getElementById('formTitle').textContent = '編輯客戶'; }
        function deleteCustomer(i) { if (confirm('確定刪除？')) { customers.splice(i, 1); saveUserData(); renderTable(); } }
        function cancelEdit() { editingId = null; document.getElementById('formTitle').textContent = '新增客戶'; document.querySelectorAll('input, textarea').forEach(el => el.value = el.type === 'number' ? 0 : ''); }

        function filterTable() {
            const keyword = document.getElementById('search').value.toLowerCase();
            const filtered = customers.filter(c => c.name.toLowerCase().includes(keyword) || c.phone.includes(keyword));
            renderTable(filtered);
        }

        function exportExcel() {
            if (customers.length === 0) return alert("沒有資料可匯出");
            const ws = XLSX.utils.json_to_sheet(customers.map((c,i) => ({
                "序號": i+1, "姓名": c.name, "電話": c.phone, "商品": c.product,
                "本次收款": c.payment, "欠款": c.debt, "地址": c.address,
                "下次送貨": c.nextDelivery, "備註": c.note
            })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "客戶資料");
            XLSX.writeFile(wb, `客戶資料_${new Date().toISOString().slice(0,10)}.xlsx`);
        }

        function importExcel(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                customers = json.map(row => ({
                    name: row.姓名 || '',
                    phone: row.電話 || '',
                    product: row.商品 || '',
                    payment: row.本次收款 || 0,
                    debt: row.欠款 || 0,
                    address: row.地址 || '',
                    nextDelivery: row.下次送貨 || '',
                    note: row.備註 || ''
                }));
                saveUserData();
                renderTable();
                alert('匯入成功！');
            };
            reader.readAsArrayBuffer(file);
        }

        function toggleLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('loginModal').style.display = 'none'; }

        window.onload = () => {
            initGoogle();
            const saved = localStorage.getItem('currentGoogleUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                updateUIAfterLogin();
            } else {
                document.getElementById('modeText').textContent = '訪客模式';
            }
            loadUserData();
            renderTable();
        };
    </script>
</body>
</html>
