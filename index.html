<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澄跡 CRM | 客戶管理系統</title>
    <!-- 引入外部資源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; transition: all 0.3s; }
        .dark body { background-color: #121212; color: #F7F2ED; }
        .light body { background-color: #F7F2ED; color: #121212; }
    </style>
</head>
<body>

    <!-- 導航欄 -->
    <nav class="flex items-center justify-between px-8 py-4 border-b border-white/10 sticky top-0 z-50 bg-inherit">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-white text-black rounded-full flex items-center justify-center font-bold">澄</div>
            <h1 class="text-lg font-medium tracking-widest">CHENG CRM</h1>
        </div>

        <div class="flex items-center gap-6">
            <input type="text" id="searchInput" placeholder="搜尋姓名/電話..." 
                class="bg-white/5 border border-white/10 rounded-full py-1.5 px-4 text-sm focus:outline-none focus:ring-1 focus:ring-white/30">
            
            <button onclick="toggleTheme()" class="p-2 hover:bg-white/10 rounded-full">
                <i data-lucide="moon" id="themeIcon"></i>
            </button>

            <!-- Google 登入按鈕容器 -->
            <div id="g_id_onload"
                 data-client_id="95788600787-f8uq7eg5rs5vb7i9r1i7m88npkdb0upd.apps.googleusercontent.com"
                 data-callback="handleCredentialResponse"
                 data-auto_prompt="false">
            </div>
            <div id="googleBtnWrapper" class="flex items-center gap-3">
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="outline" data-text="signin_with" data-size="medium" data-logo_alignment="left"></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-end mb-8">
            <div>
                <p class="text-xs opacity-40 uppercase mb-1">Management</p>
                <h2 class="text-3xl font-light">客戶名錄</h2>
            </div>
            <div class="flex gap-2">
                <input type="file" id="excelInput" class="hidden" onchange="importExcel(this)">
                <button onclick="document.getElementById('excelInput').click()" class="px-4 py-2 border border-white/10 rounded text-sm hover:bg-white/5">匯入 Excel</button>
                <button onclick="exportExcel()" class="px-4 py-2 border border-white/10 rounded text-sm hover:bg-white/5">匯出 Excel</button>
                <button onclick="openModal()" class="px-6 py-2 bg-white text-black rounded text-sm font-medium ml-4 hover:bg-gray-200">新增客戶</button>
            </div>
        </div>

        <!-- 表格 -->
        <div class="rounded-lg border border-white/10 overflow-hidden bg-white/5">
            <table class="w-full text-left">
                <thead class="text-xs opacity-50 bg-white/5">
                    <tr>
                        <th class="px-6 py-4">姓名</th>
                        <th class="px-6 py-4">電話</th>
                        <th class="px-6 py-4 text-right">欠款</th>
                        <th class="px-6 py-4">地址</th>
                        <th class="px-6 py-4">預計送貨</th>
                        <th class="px-6 py-4 text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm divide-y divide-white/5"></tbody>
            </table>
        </div>
    </main>

    <!-- 彈窗 -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
        <div class="bg-[#1A1A1B] w-full max-w-lg rounded-xl p-8 border border-white/10">
            <h3 id="modalTitle" class="text-xl mb-6">新增客戶</h3>
            <form id="customerForm" class="grid grid-cols-2 gap-4">
                <input type="hidden" id="editIdx">
                <div class="col-span-1"><label class="block text-xs opacity-50 mb-1">姓名</label><input type="text" id="f_name" required class="w-full bg-white/5 p-2 rounded"></div>
                <div class="col-span-1"><label class="block text-xs opacity-50 mb-1">電話</label><input type="text" id="f_phone" required class="w-full bg-white/5 p-2 rounded"></div>
                <div class="col-span-2"><label class="block text-xs opacity-50 mb-1">地址</label><input type="text" id="f_addr" class="w-full bg-white/5 p-2 rounded"></div>
                <div class="col-span-2"><label class="block text-xs opacity-50 mb-1">商品細項</label><input type="text" id="f_items" class="w-full bg-white/5 p-2 rounded"></div>
                <div class="col-span-1"><label class="block text-xs opacity-50 mb-1">本次收款</label><input type="number" id="f_pay" value="0" class="w-full bg-white/5 p-2 rounded"></div>
                <div class="col-span-1"><label class="block text-xs opacity-50 mb-1">欠款金額</label><input type="number" id="f_debt" value="0" class="w-full bg-white/5 p-2 rounded"></div>
                <div class="col-span-2"><label class="block text-xs opacity-50 mb-1">下次送貨</label><input type="datetime-local" id="f_date" class="w-full bg-white/5 p-2 rounded"></div>
                <div class="col-span-2 pt-4 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 opacity-60">取消</button>
                    <button type="submit" class="px-6 py-2 bg-white text-black rounded">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let customers = JSON.parse(localStorage.getItem('crm_data')) || [];
        lucide.createIcons();

        function render(data = customers) {
            const body = document.getElementById('tableBody');
            body.innerHTML = data.map((c, i) => `
                <tr class="hover:bg-white/5">
                    <td class="px-6 py-4">${c.name}</td>
                    <td class="px-6 py-4 opacity-70">${c.phone}</td>
                    <td class="px-6 py-4 text-right ${c.debt > 0 ? 'text-orange-300' : ''}">$${c.debt}</td>
                    <td class="px-6 py-4">
                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(c.addr)}" target="_blank" class="hover:text-blue-400"><i data-lucide="map-pin" class="w-4 h-4"></i></a>
                    </td>
                    <td class="px-6 py-4 text-xs">
                        ${c.date ? `${c.date.replace('T', ' ')} <br> <button onclick="addToCal('${c.name}','${c.date}')" class="text-blue-400">同步行事曆</button>` : '-'}
                    </td>
                    <td class="px-6 py-4 text-center">
                        <button onclick="edit(${i})" class="mr-2 opacity-50 hover:opacity-100">編輯</button>
                        <button onclick="del(${i})" class="text-red-400 opacity-50 hover:opacity-100">刪除</button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        document.getElementById('customerForm').onsubmit = (e) => {
            e.preventDefault();
            const idx = document.getElementById('editIdx').value;
            const obj = {
                name: document.getElementById('f_name').value,
                phone: document.getElementById('f_phone').value,
                addr: document.getElementById('f_addr').value,
                items: document.getElementById('f_items').value,
                debt: document.getElementById('f_debt').value,
                date: document.getElementById('f_date').value
            };
            if(idx === "") customers.push(obj); else customers[idx] = obj;
            localStorage.setItem('crm_data', JSON.stringify(customers));
            render(); closeModal();
        };

        function del(i) { if(confirm('刪除？')) { customers.splice(i,1); localStorage.setItem('crm_data', JSON.stringify(customers)); render(); } }
        function edit(i) {
            const c = customers[i];
            document.getElementById('editIdx').value = i;
            document.getElementById('f_name').value = c.name;
            document.getElementById('f_phone').value = c.phone;
            document.getElementById('f_addr').value = c.addr;
            document.getElementById('f_items').value = c.items;
            document.getElementById('f_debt').value = c.debt;
            document.getElementById('f_date').value = c.date;
            openModal();
        }

        function exportExcel() {
            const ws = XLSX.utils.json_to_sheet(customers);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, "CRM_Data.xlsx");
        }

        function importExcel(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const workbook = XLSX.read(e.target.result, {type: 'binary'});
                customers = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                localStorage.setItem('crm_data', JSON.stringify(customers));
                render();
            };
            reader.readAsBinaryString(input.files[0]);
        }

        function addToCal(n, d) {
            const time = d.replace(/[-:]/g, '');
            window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=送貨:${n}&dates=${time}/${time}`, '_blank');
        }

        document.getElementById('searchInput').oninput = (e) => {
            const v = e.target.value.toLowerCase();
            render(customers.filter(c => c.name.toLowerCase().includes(v) || c.phone.includes(v)));
        };

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('customerForm').reset(); document.getElementById('editIdx').value=""; }

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.classList.toggle('dark');
            html.classList.toggle('light', !isDark);
            document.getElementById('themeIcon').setAttribute('data-lucide', isDark ? 'moon' : 'sun');
            lucide.createIcons();
        }

        // Google 登入處理
        function handleCredentialResponse(response) {
            const payload = JSON.parse(atob(response.credential.split('.')[1]));
            document.getElementById('googleBtnWrapper').innerHTML = `
                <div class="flex items-center gap-2">
                    <img src="${payload.picture}" class="w-6 h-6 rounded-full">
                    <span class="text-xs">${payload.name}</span>
                    <button onclick="location.reload()" class="text-[10px] opacity-50">登出</button>
                </div>
            `;
            alert('登入成功！資料目前仍存在此電腦，雲端庫同步開發中。');
        }

        render();
    </script>
</body>
</html>
