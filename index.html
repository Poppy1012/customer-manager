<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>客戶存摺</title>
    <meta name="theme-color" content="#141d2c" />
    <meta name="description" content="客戶管理、收款追蹤、月度利潤計算工具" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="客戶存摺" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="phone-shell">
      <section class="screen splash-screen active" data-screen="splash">
        <div class="status-bar" aria-hidden="true"></div>
        <div class="splash-art" aria-hidden="true">
          <div class="blob"></div>
          <div class="book">
            <div class="book-page"></div>
            <div class="book-face"><span></span><i></i><i></i><i></i></div>
          </div>
        </div>
        <div class="splash-copy">
          <h1>客戶存摺</h1>
          <p>客戶管理・收款追蹤・月度利潤</p>
        </div>
        <div class="dots"><b></b><b></b><b></b></div>
        <button class="primary wide" id="startButton" type="button">開始使用</button>
      </section>

      <section class="screen app-screen" data-screen="home">
        <div class="status-bar" aria-hidden="true"></div>
        <header class="app-header">
          <div>
            <p id="storageLabel">訪客模式，本機儲存</p>
            <h1>客戶存摺</h1>
          </div>
          <button class="icon-btn" id="searchToggle" type="button" aria-label="搜尋">
            <svg viewBox="0 0 24 24"><path d="M9.5 3a6.5 6.5 0 0 1 5.15 10.46l4.45 4.44-1.4 1.42-4.46-4.45A6.5 6.5 0 1 1 9.5 3Zm0 2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9Z"/></svg>
          </button>
        </header>

        <div class="search-box" id="searchBox" hidden>
          <input id="searchInput" placeholder="搜尋姓名、電話、地址、商品、備註" />
        </div>

        <section class="stats-grid">
          <article>
            <span class="stat-icon blue">人</span>
            <small>客戶總數</small>
            <strong id="totalCount">0</strong>
          </article>
          <article>
            <span class="stat-icon green">$</span>
            <small>實收金額</small>
            <strong id="totalPayment">$0</strong>
          </article>
          <article>
            <span class="stat-icon red">欠</span>
            <small>應收未收</small>
            <strong id="totalDebt">$0</strong>
          </article>
        </section>

        <section class="home-month-card">
          <div>
            <small>本月利潤</small>
            <strong id="homeMonthProfit">$0</strong>
          </div>
          <button class="pill active" data-tab="stats" type="button">查看月度</button>
        </section>

        <div class="filter-row">
          <button class="pill active" data-filter="all" type="button">全部客戶</button>
          <button class="pill" data-filter="debt" type="button">有欠款</button>
          <button class="pill" data-filter="delivery" type="button">待送貨</button>
          <button class="pill soft" id="importButton" type="button">匯入</button>
          <button class="pill soft" id="exportButton" type="button">匯出</button>
          <input id="importInput" type="file" accept=".xlsx,.xls" hidden />
        </div>

        <div class="customer-list" id="customerList"></div>
        <div class="empty-card" id="emptyState">
          <strong>還沒有客戶資料</strong>
          <span>點底部「新增」建立第一位客戶。</span>
        </div>
      </section>

      <section class="screen customers-screen" data-screen="customers">
        <div class="status-bar" aria-hidden="true"></div>
        <header class="page-header">
          <h1>客戶分析</h1>
          <button class="link-btn" data-tab="home" type="button">返回</button>
        </header>
        <section class="analytics-summary">
          <article><small>客戶營業額</small><strong id="customerRevenueTotal">$0</strong></article>
          <article><small>累計叫貨金額</small><strong id="orderAmountTotal">$0</strong></article>
        </section>
        <div class="analytics-list" id="customerAnalyticsList"></div>
      </section>

      <section class="screen detail-screen" data-screen="detail">
        <div class="status-bar" aria-hidden="true"></div>
        <header class="page-header">
          <button class="plain-icon" data-action="back" type="button">‹</button>
          <button class="link-btn" id="editDetailButton" type="button">編輯</button>
        </header>

        <section class="profile-card">
          <div class="avatar large" id="detailAvatar">客</div>
          <div>
            <h2 id="detailName">客戶姓名</h2>
            <p id="detailPhone">電話</p>
          </div>
        </section>

        <section class="amount-card">
          <div><small>總金額</small><strong id="detailTotal">$0</strong></div>
          <div><small>應收未收</small><strong class="danger" id="detailDebt">$0</strong></div>
          <div><small>實收金額</small><strong class="success" id="detailPayment">$0</strong></div>
        </section>

        <section class="info-card">
          <div class="info-row">
            <span>⌖</span>
            <div><small>地址</small><a id="detailAddress" target="_blank" rel="noreferrer">未填寫</a></div>
          </div>
          <div class="info-row">
            <span>▣</span>
            <div><small>累計叫貨產品</small><div class="product-list" id="detailProducts"></div></div>
          </div>
          <div class="info-row">
            <span>▣</span>
            <div><small>下次送貨日期</small><a id="detailCalendar" target="_blank" rel="noreferrer">未設定</a></div>
          </div>
          <div class="info-row">
            <span>✎</span>
            <div><small>備註</small><p id="detailNotes">無</p></div>
          </div>
        </section>

        <section class="records-card">
          <header><h3>交易記錄</h3></header>
          <div id="recordRows"></div>
        </section>
      </section>

      <section class="screen form-screen" data-screen="form">
        <div class="status-bar" aria-hidden="true"></div>
        <header class="page-header">
          <button class="plain-icon" data-action="back" type="button">‹</button>
          <h1 id="formTitle">新增客戶</h1>
          <button class="link-btn" id="saveTopButton" type="button">儲存</button>
        </header>

        <form id="customerForm" autocomplete="off">
          <label><span>姓名</span><input id="name" name="name" required placeholder="請輸入姓名" /></label>
          <label><span>電話</span><input id="phone" name="phone" required placeholder="請輸入電話" /></label>
          <label><span>地址</span><input id="address" name="address" placeholder="請輸入地址" /></label>
          <label>
            <span>本次商品細項</span>
            <textarea id="items" name="items" rows="4" placeholder="例：蜂蜜 500&#10;茶葉 1200&#10;也可只輸入品項，金額會平均分配"></textarea>
          </label>
          <div class="money-grid">
            <label><span>實收金額</span><input id="payment" name="payment" type="number" min="0" step="1" placeholder="0" /></label>
            <label><span>應收未收</span><input id="debt" name="debt" type="number" min="0" step="1" placeholder="0" /></label>
            <label><span>總金額</span><input id="total" name="total" type="number" min="0" step="1" placeholder="自動計算" /></label>
          </div>
          <label><span>下次送貨日期</span><input id="nextDelivery" name="nextDelivery" type="datetime-local" /></label>
          <label><span>備註</span><textarea id="notes" name="notes" rows="5" placeholder="請輸入備註（選填）"></textarea></label>
          <button class="primary wide" type="submit" id="submitButton">儲存客戶</button>
          <button class="delete-wide" id="deleteFormButton" type="button" hidden>刪除客戶</button>
        </form>
      </section>

      <section class="screen stats-screen" data-screen="stats">
        <div class="status-bar" aria-hidden="true"></div>
        <header class="page-header">
          <h1>月度</h1>
          <button class="link-btn" data-tab="home" type="button">返回</button>
        </header>
        <label class="month-picker">
          <span>月份</span>
          <input id="monthInput" type="month" />
        </label>
        <section class="monthly-grid">
          <article><small>本月應收帳款</small><strong id="monthReceivable">$0</strong></article>
          <article><small>本月實收帳款</small><strong id="monthReceived">$0</strong></article>
          <article><small>本月未收帳款</small><strong id="monthDebt">$0</strong></article>
          <article><small>本月成本</small><input id="monthCost" type="number" min="0" step="1" placeholder="0" /></article>
        </section>
        <section class="profit-card">
          <small>本月利潤</small>
          <strong id="monthProfit">$0</strong>
        </section>
        <section class="records-card">
          <header><h3>本月客戶</h3></header>
          <div id="monthRows"></div>
        </section>
      </section>

      <section class="screen settings-screen" data-screen="settings">
        <div class="status-bar" aria-hidden="true"></div>
        <header class="page-header">
          <button class="plain-icon" data-action="back" type="button">‹</button>
          <h1>設定</h1>
          <span></span>
        </header>
        <section class="settings-card">
          <div class="user-card" id="userChip" hidden>
            <img id="userAvatar" alt="" />
            <div><strong id="userName"></strong><small>已登入 Google</small></div>
          </div>
          <div id="googleButton"></div>
          <button class="secondary wide" id="signOutButton" type="button" hidden>登出 Google</button>
          <button class="secondary wide" id="themeButton" type="button">切換深色模式</button>
        </section>
      </section>

      <nav class="tabbar">
        <button class="tab active" data-tab="home" type="button"><span>⌂</span>首頁</button>
        <button class="tab" data-tab="customers" type="button"><span>●</span>客戶</button>
        <button class="tab plus" data-action="new" type="button"><span>＋</span>新增</button>
        <button class="tab" data-tab="stats" type="button"><span>▥</span>月度</button>
        <button class="tab" data-tab="settings" type="button"><span>⚙</span>設定</button>
      </nav>
    </div>
  </body>
</html>
